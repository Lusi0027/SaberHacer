<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-512x512 (1).png">

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <title>Registro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #031406, #16a637);
      min-height:100vh;
      color:white;
    }

    /* NAVBAR */

    .navbar{
      width:100%;
      height:90px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 50px;
      background:#021b06;
      border-bottom:2px solid rgba(255,255,255,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo i{
      font-size:55px;
      color:#2be34f;
    }

    .logo h1{
      font-size:38px;
      color:white;
      font-weight:800;
    }

    .menu{
      display:flex;
      gap:18px;
      align-items:center;
    }

    .btn-login{
      background:transparent;
      color:white;
      border:2px solid rgba(255,255,255,0.4);
      padding:13px 30px;
      border-radius:14px;
      cursor:pointer;
      font-weight:bold;
      font-size:16px;
      transition:0.3s;
    }

    .btn-login:hover{
      background:white;
      color:#021b06;
    }

    .btn-home{
      background:#2be34f;
      color:white;
      border:none;
      padding:14px 32px;
      border-radius:14px;
      cursor:pointer;
      font-weight:bold;
      font-size:16px;
      transition:0.3s;
    }

    .btn-home:hover{
      background:#1ec942;
      transform:translateY(-2px);
    }

    /* FORMULARIO */

    .container{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:60px 20px;
    }

    .register-box{
      width:550px;
      background:rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      border:2px solid rgba(255,255,255,0.15);
      border-radius:30px;
      padding:45px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    .form-logo{
      display:flex;
      justify-content:center;
      margin-bottom:15px;
    }

    .form-logo i{
      font-size:85px;
      color:#2be34f;
    }

    .register-box h2{
      text-align:center;
      font-size:55px;
      margin-bottom:35px;
      color:white;
      font-weight:800;
    }

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
      color:white;
    }

    .input-group input{
      width:100%;
      padding:16px;
      border:2px solid rgba(255,255,255,0.15);
      border-radius:14px;
      outline:none;
      font-size:16px;
      background:rgba(255,255,255,0.08);
      color:white;
      transition:0.3s;
    }

    .input-group input::placeholder{
      color:rgba(255,255,255,0.6);
    }

    .input-group input:focus{
      border:2px solid #2be34f;
      background:rgba(255,255,255,0.12);
    }

    .register-btn{
      width:100%;
      padding:16px;
      background:#2be34f;
      color:white;
      border:none;
      border-radius:14px;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
      transition:0.3s;
    }

    .register-btn:hover{
      background:#1ec942;
      transform:translateY(-2px);
    }

    .extra{
      text-align:center;
      margin-top:28px;
      font-size:18px;
      color:white;
    }

    .extra a{
      color:#7cff95;
      font-weight:bold;
      text-decoration:none;
    }

    .extra a:hover{
      text-decoration:underline;
    }

    @media(max-width:700px){

      .navbar{
        padding:20px;
        height:auto;
        flex-direction:column;
        gap:20px;
      }

      .menu{
        width:100%;
        justify-content:center;
        flex-wrap:wrap;
      }

      .register-box{
        padding:30px;
      }

      .register-box h2{
        font-size:42px;
      }

    }

  </style>
</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      <i class="fa-solid fa-graduation-cap"></i>
      <h1>SaberHacer</h1>
    </div>

    <div class="menu">

      <a href="index.html">
        <button class="btn-login">Inicio</button>
      </a>

      <a href="IniciarSesion.html">
        <button class="btn-home">Iniciar sesión</button>
      </a>

    </div>

  </nav>

  <!-- FORMULARIO -->

  <div class="container">

    <div class="register-box">

      <div class="form-logo">
        <i class="fa-solid fa-graduation-cap"></i>
      </div>

      <h2>Regístrate</h2>

      <form action="Inicio.html">

        <div class="input-group">
          <label>Nombre completo</label>
          <input type="text" placeholder="Juan Pérez">
        </div>

        <div class="input-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@gmail.com">
        </div>

        <div class="input-group">
          <label>Cédula</label>
          <input type="text" placeholder="402-4444222-2">
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" placeholder="********">
        </div>

        <div class="input-group">
          <label>Confirmar contraseña</label>
          <input type="password" placeholder="********">
        </div>

        <button type="submit" class="register-btn">
          Registrarse
        </button>

      </form>

      <div class="extra">
        ¿Ya tienes cuenta?
        <a href="IniciarSesion.html">Inicia sesión</a>
      </div>

    </div>

  </div>

</body>
</html>
