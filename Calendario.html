<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon"
          type="image/png"
          sizes="192x192"
          href="img/android-chrome-512x512 (1).png">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Calendario - SaberHacer</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #031406, #16a637);
            min-height: 100vh;
            color: white;
        }

        /* ===== HEADER ===== */

        header{

            background: #021b06;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 50px;

            border-bottom: 2px solid rgba(255,255,255,0.08);

            position: sticky;
            top: 0;
            z-index: 1000;

            box-shadow: 0px 4px 15px rgba(0,0,0,0.25);
        }

        .logo{

            display: flex;
            align-items: center;
            gap: 15px;

            text-decoration: none;
            color: white;
        }

        .logo i{
            font-size: 55px;
            color: #2be34f;
        }

        .logo h1{
            font-size: 38px;
            font-weight: 800;
        }

        nav{
            display: flex;
            gap: 18px;
            align-items: center;
        }

        nav a{
            text-decoration: none;
            color: white;
            font-weight: bold;

            padding: 12px 18px;
            border-radius: 14px;

            transition: 0.3s;
        }

        nav a:hover{
            background-color: #2be34f;
            transform: translateY(-2px);
        }

        .activo{
            background-color: #2be34f;
        }

        /* ===== TITULO ===== */

        .titulo{
            text-align: center;
            color: white;

            margin-top: 50px;
            margin-bottom: 35px;
        }

        .titulo h2{
            font-size: 60px;
            font-weight: 800;
        }

        /* ===== CALENDARIO ===== */

        .contenedor-calendario{

            width: 1000px;

            margin: auto;

            background: rgba(0,0,0,0.25);

            backdrop-filter: blur(10px);

            border-radius: 25px;

            padding: 35px;

            border: 1px solid rgba(255,255,255,0.10);

            box-shadow: 0px 10px 25px rgba(0,0,0,0.30);
        }

        .mes{

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 35px;
        }

        .mes h3{
            font-size: 42px;
            color: #7cff95;
        }

        .mes button{

            background-color: #2be34f;

            color: white;

            border: none;

            padding: 12px 22px;

            border-radius: 12px;

            cursor: pointer;

            font-size: 22px;

            font-weight: bold;

            transition: 0.3s;
        }

        .mes button:hover{
            transform: scale(1.08);
            background: #1ec942;
        }

        /* ===== DIAS ===== */

        .dias-semana,
        .dias{

            display: grid;

            grid-template-columns: repeat(7, 1fr);

            gap: 15px;
        }

        .dias-semana div{

            background: rgba(255,255,255,0.08);

            color: white;

            padding: 16px;

            text-align: center;

            border-radius: 12px;

            font-weight: bold;

            border: 1px solid rgba(255,255,255,0.08);
        }

        .dias div{

            min-height: 110px;

            background: rgba(255,255,255,0.06);

            border-radius: 14px;

            padding: 12px;

            font-weight: bold;

            position: relative;

            transition: 0.3s;

            border: 1px solid rgba(255,255,255,0.08);
        }

        .dias div:hover{

            background-color: rgba(43,227,79,0.12);

            transform: translateY(-3px);
        }

        /* ===== EVENTOS ===== */

        .evento{

            margin-top: 10px;

            background-color: #2be34f;

            color: white;

            padding: 6px;

            border-radius: 8px;

            font-size: 13px;

            text-align: center;
        }

        /* ===== RESPONSIVE ===== */

        @media(max-width:1100px){

            .contenedor-calendario{
                width: 95%;
            }

        }

        @media(max-width:850px){

            header{
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            nav{
                flex-wrap: wrap;
                justify-content: center;
            }

            .titulo h2{
                font-size: 42px;
            }

            .mes h3{
                font-size: 30px;
            }

            .dias-semana,
            .dias{
                gap: 8px;
            }

            .dias div{
                min-height: 85px;
                font-size: 14px;
            }

            .evento{
                font-size: 10px;
            }

        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <header>

        <a href="Inicio.html" class="logo">

            <i class="fa-solid fa-graduation-cap"></i>

            <h1>SaberHacer</h1>

        </a>

        <nav>

            <a href="Inicio.html">Inicio</a>

            <a href="miprogreso.html">Mi progreso</a>

            <a href="Cursos.html">Cursos</a>

            <a href="#">Certificados</a>

            <a href="calendario.html" class="activo">
                Calendario
            </a>

        </nav>

    </header>

    <!-- TITULO -->

    <section class="titulo">

        <h2>Calendario Académico</h2>

    </section>

    <!-- CALENDARIO -->

    <section class="contenedor-calendario">

        <div class="mes">

            <button>◀</button>

            <h3>Mayo 2026</h3>

            <button>▶</button>

        </div>

        <!-- DIAS SEMANA -->

        <div class="dias-semana">

            <div>Dom</div>
            <div>Lun</div>
            <div>Mar</div>
            <div>Mié</div>
            <div>Jue</div>
            <div>Vie</div>
            <div>Sáb</div>

        </div>

        <!-- DIAS -->

        <div class="dias">

            <div></div>
            <div></div>
            <div></div>

            <div>1</div>

            <div>2</div>

            <div>3</div>

            <div>4</div>

            <div>5</div>

            <div>
                6

                <div class="evento">
                    Tarea
                </div>

            </div>

            <div>7</div>

            <div>8</div>

            <div>
                9

                <div class="evento">
                    Examen
                </div>

            </div>

            <div>10</div>

            <div>11</div>

            <div>12</div>

            <div>13</div>

            <div>14</div>

            <div>15</div>

            <div>
                16

                <div class="evento">
                    Proyecto
                </div>

            </div>

            <div>17</div>

            <div>18</div>

            <div>19</div>

            <div>20</div>

            <div>21</div>

            <div>22</div>

            <div>23</div>

            <div>24</div>

            <div>25</div>

            <div>26</div>

            <div>27</div>

            <div>28</div>

            <div>29</div>

            <div>30</div>

            <div>31</div>

        </div>

    </section>

</body>
</html>
