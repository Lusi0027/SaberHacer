<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-512x512 (1).png">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>SaberHacer</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #031406, #000000);
            color: white;
        }

        /* HEADER */

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: #000000;
            border-bottom: 2px solid rgba(255,255,255,0.08);
        }

        .logo{
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i{
            font-size: 55px;
            color: #2be34f;
        }

        .logo h1{
            font-size: 38px;
            color: white;
            font-weight: 800;
        }

        nav{
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .btn-login{
            background-color: #2be34f;
            color: white;
            border: none;
            padding: 13px 30px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-login:hover{
            background: #1ec942;
            transform: translateY(-2px);
        }

        .btn-home{
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 13px 30px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-home:hover{
            background: white;
            color: #021b06;
        }

        /* CONTENEDOR */

        .contenedor{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .login-box{
            width: 450px;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .form-logo{
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .form-logo i{
            font-size: 85px;
            color: #2be34f;
        }

        .login-box h2{
            text-align: center;
            margin-bottom: 40px;
            font-size: 50px;
            color: white;
            font-weight: 800;
        }

        .campo{
            margin-bottom: 25px;
        }

        .campo label{
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .campo input{
            width: 100%;
            padding: 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .campo input::placeholder{
            color: rgba(255,255,255,0.6);
        }

        .campo input:focus{
            border: 2px solid #2be34f;
            background: rgba(255,255,255,0.12);
        }

        .olvido{
            text-align: center;
            margin-top: -5px;
            margin-bottom: 25px;
        }

        .olvido a{
            color: #7cff95;
            font-size: 15px;
            text-decoration: none;
        }

        .olvido a:hover{
            text-decoration: underline;
        }

        .btn-entrar{
            display: block;
            width: 100%;
            text-align: center;
            background-color: #2be34f;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 22px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-entrar:hover{
            background: #1ec942;
            transform: translateY(-2px);
        }

        .registro{
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
            color: white;
        }

        .registro a{
            color: #7cff95;
            font-weight: bold;
            text-decoration: none;
        }

        .registro a:hover{
            text-decoration: underline;
        }

        @media(max-width:700px){

            header{
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            nav{
                flex-wrap: wrap;
                justify-content: center;
            }

            .login-box{
                width: 100%;
                max-width: 450px;
                padding: 30px;
            }

            .login-box h2{
                font-size: 42px;
            }

        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <h1>SaberHacer</h1>
        </div>

        <nav>

            <a href="index.html">
                <button class="btn-home">Inicio</button>
            </a>

            <a href="Registro.html">
                <button class="btn-login">Registro</button>
            </a>

        </nav>

    </header>

    <!-- FORMULARIO -->

    <div class="contenedor">

        <div class="login-box">

            <div class="form-logo">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>

            <h2>Inicia sesión</h2>

            <div class="campo">
                <label>Cédula</label>
                <input type="text" placeholder="402-4444222-2">
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" placeholder="********">
            </div>

            <div class="olvido">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <a href="Inicio.html" class="btn-entrar">
               Inicia sesión
            </a>

            <div class="registro">
                ¿Aún no tienes cuenta?
                <a href="Registro.html">Regístrate</a>
            </div>

        </div>

    </div>

</body>
</html>
