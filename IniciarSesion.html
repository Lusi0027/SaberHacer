<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-512x512 (1).png">
    <title>SaberHacer</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f5f5f5;
        }


        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img{
            width: 60px;
        }

        .logo h1{
            font-size: 32px;
            color: #111;
        }

        nav{
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-login{
            background-color: #064e64;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        nav a{
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        .contenedor{
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
        }

        .login-box{
            width: 420px;
            border: 3px solid #064e64;
            border-radius: 20px;
            padding: 40px;
            background-color: white;
        }

        .login-box h2{
            text-align: center;
            margin-bottom: 40px;
            font-size: 38px;
        }

        .campo{
            margin-bottom: 25px;
        }

        .campo label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 22px;
        }

        .campo input{
            width: 100%;
            padding: 12px;
            border: 2px solid #064e64;
            border-radius: 8px;
            font-size: 16px;
        }

        .olvido{
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .olvido a{
            color: black;
            font-size: 14px;
        }

        .btn-entrar{
    display: block;
    width: fit-content;

    margin: auto;

    background-color: #7ed957;
    color: rgb(0, 0, 0);
    text-decoration: none;

    padding: 12px 28px;
    border-radius: 6px;

    font-weight: bold;
}
 

        .registro{
            text-align: center;
            margin-top: 30px;
            font-weight: bold;
        }

        .registro a{
            color: black;
        }

        .btn-home{
    background-color: white;
    color: #062b63;
    border: 2px solid #062b63;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

.btn-home:hover{
    background-color: #062b63;
    color: white;
}

    </style>

</head>
<body>

    <header>

        <div class="logo">
            <img src="img/Logotransparente.png"  alt="Logo" width="190">
            <h1>SaberHacer</h1>
        
        </div>

        <nav>
            <nav>

     <a href="index.html">
        <button class="btn-home">Inicio</button>
     </a>

     <a href="Registro.html">
        <button class="btn-login">Registro</button>
     </a>

</nav>
        </nav>

    </header>

    <div class="contenedor">

        <div class="login-box">

            <h2>Inicia sesión</h2>

            <div class="campo">
                <label>Cédula</label>
                <input type="text" placeholder="402-4444222-2">
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" placeholder="********">
            </div>

            <div class="olvido">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <a href="Inicio.html" class="btn-entrar">
               Inicia sesión
            </a>


            <div class="registro">
                ¿Aun no tienes cuenta?
                <a href="Registro.html">Regístrate</a>
            </div>

        </div>

    </div>

</body>
</html>
